<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<label for="name">Name:</label>
    <input type="text" id="name" required>
    <br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" required>
    <br><br>

    <label for="gender">Gender:</label>
    <input type="radio" id="gender_m" name="gender" required>
    <label for="gender_m">Male</label>
    <input type="radio" id="gender_f" name="gender" required>
    <label for="gender_f">Female</label>
    <br><br>

    <label for="cars">Cars Brands:</label>
    <select name="cars" id="cars">
        <option >Options:</option>
        <option >BMW</option>
        <option >Audi</option>
        <option >Mercedez</option>
    </select>
    <br><br>
    <label for="carage">Cars Age:</label>
    <input type="number" id="carage" required>
    <br><br>

    <label for="dop">Date of Purchase (dop):</label>
    <input type="date" required>
    <br><br>

    <label for="password">Password</label>
    <input type="password" id="password" required>
    <br><br>

    <button type="submit">Submit</button>
  
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
